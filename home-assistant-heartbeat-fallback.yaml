input_datetime:
  home_manager_last_heartbeat:
    name: Home Manager Last Heartbeat
    has_date: true
    has_time: true

automation:
  - alias: Home Manager - fallback when heartbeat is stale
    id: home_manager_fallback_heartbeat_stale
    mode: single
    trigger:
      - platform: time_pattern
        minutes: "/1"
    condition:
      - condition: template
        value_template: >
          {% set heartbeat = states('input_datetime.home_manager_last_heartbeat') %}
          {% if heartbeat in ['unknown', 'unavailable', 'none', None] %}
            true
          {% else %}
            {{ (as_timestamp(now()) - as_timestamp(heartbeat)) > 180 }}
          {% endif %}
    action:
      - service: climate.set_preset_mode
        target:
          entity_id:
            - climate.salon
            - climate.sypialnia
            - climate.lazienka
        data:
          preset_mode: "eco"
