services:
  mariadb:
    image: mariadb:11.4
    container_name: home-manager-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: home_manager_db
      MARIADB_USER: home_manager_app
      MARIADB_PASSWORD: ${HOMEMANAGER_DB_PASSWORD:-home_manager_password}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-home_manager_root_password}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: HomeManager.Api/Dockerfile
    container_name: home-manager-api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MariaDb: Server=mariadb;Port=3306;Database=home_manager_db;User=home_manager_app;Password=${HOMEMANAGER_DB_PASSWORD:-home_manager_password};
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s

  frontend:
    build:
      context: .
      dockerfile: HomeManager.Frontend/Dockerfile
    container_name: home-manager-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "4200:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mariadb_data:
